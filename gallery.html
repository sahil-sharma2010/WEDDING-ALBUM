    <meta charset="UTF-8">

    <title>The Royal Album | Exclusive Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --royal-gold: #D4AF37;
            --dark-gold: #996515;
            --matte-black: #0a0a0a;
            --gold-gradient: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--matte-black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top center, #151515 0%, #000000 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER SECTION */
        .header {
            text-align: center;
            padding: 40px 20px 20px; 
            position: relative;
        }

        .user-welcome {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--royal-gold);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px; 
            font-weight: 300;
            letter-spacing: 5px;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .sub-title {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .developer-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #996515 0%, #fcf6ba 50%, #996515 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            animation: goldShine 3s linear infinite;
            margin-bottom: 25px; 
            display: inline-block;
        }

        @keyframes goldShine {
            to { background-position: 200% center; }
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--royal-gold);
            color: var(--royal-gold);
            padding: 8px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            border-radius: 3px;
        }

        .logout-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        /* STRICT GALLERY SIZING */
        .gallery-container {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
            justify-content: center;
        }

        /* ✨ NEW BLACK & GOLD FRAME DESIGN ✨ */
        .gallery-item {
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            
            /* The Frame Styling */
            background: #000; 
            padding: 12px; 
            border: 3px solid var(--royal-gold); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); 

            cursor: pointer;
            opacity: 0; 
            transform: translateY(30px);
            transition: all 0.4s ease;
        }

        .gallery-item:hover {
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); 
            transform: translateY(-5px); 
            border-color: #fcf6ba; 
        }

        .gallery-item img {
            width: 100%;
            height: 300px; 
            object-fit: cover; 
            display: block;
            border-radius: 3px;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05); 
            filter: brightness(1.1);
        }

        /* 3D LIGHTBOX POPUP */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; transition: opacity 0.3s ease;
            perspective: 1500px; 
        }
        
        .lightbox.active { display: flex; opacity: 1; }
        
        .lightbox-img-wrapper {
            position: relative;
            max-width: 90%; 
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ZOOM HONE PAR BHI FRAME DIKHEGA */
        .lightbox img {
            max-width: 100%; max-height: 85vh; border-radius: 5px;
            
            background: #000;
            padding: 15px;
            border: 4px solid var(--royal-gold);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); 
            
            transform-style: preserve-3d; 
        }

        /* PREMIUM GOLDEN ARROWS */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--royal-gold);
            font-size: 35px;
            cursor: pointer;
            z-index: 1001;
            padding: 15px;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); 
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .left-arrow { left: 5%; }
        .right-arrow { right: 5%; }

        .nav-arrow:hover {
            color: white;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--royal-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-50%) scale(1.1);
        }

        .close-btn {
            position: absolute; top: 20px; right: 30px; color: var(--royal-gold);
            font-size: 40px; cursor: pointer; transition: 0.3s; z-index: 1002;
        }
        .close-btn:hover { color: white; transform: scale(1.1); text-shadow: 0 0 15px rgba(255,255,255,0.5); }

        @media (max-width: 768px) {
            .nav-arrow { font-size: 24px; width: 45px; height: 45px; padding: 10px; }
            .left-arrow { left: 2%; }
            .right-arrow { right: 2%; }
            
            .gallery-item { padding: 8px; border-width: 2px; }
            .lightbox img { padding: 10px; border-width: 3px; }
        }

    </style>
</head>

    <script>
        // Full Array of 71 images for Navigation (PIC1 updated to .png)
        const imagesList = [
            'images/PIC1.png', 'images/PIC2.jpeg', 'images/PIC3.jpeg', 'images/PIC4.png',
            'images/PIC5.jpeg', 'images/PIC6.png', 'images/PIC7.png', 'images/PIC8.png',
            'images/PIC9.jpeg', 'images/PIC10.png', 'images/PIC11.png', 'images/PIC12.jpeg',
            'images/PIC13.jpeg', 'images/PIC14.jpeg', 'images/PIC15.jpeg', 'images/PIC16.jpeg',
            'images/PIC17.jpeg', 'images/PIC18.jpeg', 'images/PIC19.jpeg', 'images/PIC20.jpeg',
            'images/PIC21.jpeg', 'images/PIC22.jpeg', 'images/PIC23.jpeg', 'images/PIC24.jpeg',
            'images/PIC25.jpeg', 'images/PIC26.jpeg', 'images/PIC27.jpeg', 'images/PIC28.jpeg',
            'images/PIC29.jpeg', 'images/PIC30.jpeg', 'images/PIC31.jpeg', 'images/PIC32.jpeg',
            'images/PIC33.jpeg', 'images/PIC34.jpeg', 'images/PIC35.jpeg', 'images/PIC36.jpeg',
            'images/PIC37.jpeg', 'images/PIC38.jpeg', 'images/PIC39.jpeg', 'images/PIC40.jpeg',
            'images/PIC41.jpeg', 'images/PIC42.jpeg', 'images/PIC43.jpeg', 'images/PIC44.jpeg',
            'images/PIC45.jpeg', 'images/PIC46.jpeg', 'images/PIC47.jpeg', 'images/PIC48.jpeg',
            'images/PIC49.jpeg', 'images/PIC50.jpeg', 'images/PIC51.jpeg', 'images/PIC52.jpeg',
            'images/PIC53.jpeg', 'images/PIC54.jpeg', 'images/PIC55.jpeg', 'images/PIC56.jpeg',
            'images/PIC57.jpeg', 'images/PIC58.jpeg', 'images/PIC59.jpeg', 'images/PIC60.jpeg',
            'images/PIC61.jpeg', 'images/PIC62.jpeg', 'images/PIC63.jpeg', 'images/PIC64.jpeg',
            'images/PIC65.jpeg', 'images/PIC66.jpeg', 'images/PIC67.jpeg', 'images/PIC68.jpeg',
            'images/PIC69.jpeg', 'images/PIC70.jpeg', 'images/PIC71.jpeg'
        ];
        
        let currentImgIndex = 0;
        let isAnimating = false; 

        window.onload = function() {
            const name = localStorage.getItem("viewerName") || "GUEST";
            document.getElementById("welcomeMsg").innerText = `Hi ${name}, Welcome To`;

            if (localStorage.getItem("albumAccessKey") !== "granted") {
                // Testing mode: Access bina login ke, warna isko open kar sakte ho
                // window.location.href = "index.html"; 
            }
            
            // Reveal Animation
            gsap.to(".gallery-item", {
                opacity: 1, y: 0, duration: 1, stagger: 0.15, ease: "power3.out", delay: 0.2
            });

            // GOLDEN FIREWORKS FOR 5 SECONDS
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999, colors: ['#D4AF37', '#fcf6ba', '#996515', '#aa771c'] };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 250);
        };

        // Open specific image
        function openLightbox(index) {
            currentImgIndex = index;
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");
            
            lightboxImg.src = imagesList[currentImgIndex];
            gsap.set(lightboxImg, { rotationY: 0, scale: 1, opacity: 1 }); 
            
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden"; 
        }

        // SMOOTH 3D IMAGE CHANGE
        function changeImage(direction, event) {
            if(event) event.stopPropagation(); 
            if(isAnimating) return; 
            isAnimating = true;

            const lightboxImg = document.getElementById("lightbox-img");
            
            let nextIndex = (currentImgIndex + direction + imagesList.length) % imagesList.length;

            // 3D Flip OUT Animation
            gsap.to(lightboxImg, {
                rotationY: direction === 1 ? -90 : 90, 
                opacity: 0,
                scale: 0.8,
                duration: 0.4,
                ease: "power2.in",
                onComplete: () => {
                    currentImgIndex = nextIndex;
                    lightboxImg.src = imagesList[currentImgIndex]; 
                    
                    // 3D Flip IN Animation
                    gsap.fromTo(lightboxImg, 
                        { rotationY: direction === 1 ? 90 : -90, opacity: 0, scale: 0.8 },
                        { rotationY: 0, opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.2)", onComplete: () => isAnimating = false }
                    );
                }
            });
        }

        // Close Lightbox safely
        function closeLightbox(event) {
            if (event.target.id === "lightbox" || event.target.id === "closeBtn") {
                const lightbox = document.getElementById("lightbox");
                lightbox.classList.remove("active");
                document.body.style.overflow = "auto"; 
            }
        }

        // LAPTOP KEYBOARD ARROWS INTEGRATION
        document.addEventListener('keydown', function(event) {
            const lightbox = document.getElementById("lightbox");
            if (lightbox.classList.contains("active")) {
                if (event.key === 'ArrowRight') {
                    changeImage(1); 
                } else if (event.key === 'ArrowLeft') {
                    changeImage(-1); 
                } else if (event.key === 'Escape') {
                    lightbox.classList.remove("active");
                    document.body.style.overflow = "auto";
                }
            }
        });

        function logout() {
            gsap.to("body", {
                opacity: 0, duration: 0.8,
                onComplete: () => {
                    localStorage.clear();
                    window.location.href = "index.html";
                }
            });
        }
    </script>
